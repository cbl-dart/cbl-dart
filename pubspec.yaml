name: cbl_dart_repo
publish_to: none

environment:
  sdk: ^3.0.0

dev_dependencies:
  cbd:
    path: tool
  # daco removed: requires analyzer ^7.0.0, incompatible with tool's ^10.0.0.
  # Needs daco update to support analyzer 10+.
  melos: ^6.3.2
  path: ^1.9.1

dependency_overrides:
  cbl:
    path: packages/cbl
  cbl_libcblite_api:
    path: packages/cbl_libcblite_api
  cbl_libcblitedart_api:
    path: packages/cbl_libcblitedart_api
