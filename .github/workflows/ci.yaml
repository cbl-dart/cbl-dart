name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
  pull_request:
    paths-ignore:
      - docs/**
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  flutter-channel: stable
  dart-version-stable: stable
  dart-version-beta: beta

jobs:
  formatting-dart:
    name: Formatting - Dart
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.flutter-channel }}
          cache: true

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Setup cbd
        run: melos activate:cbd

      - name: Install daco
        run: dart pub global activate daco

      - name: Get dependencies
        run: dart pub get

      - name: Check formatting
        run: melos formatting:check

      - name: Print diff
        if: failure()
        run: git diff

  formatting-clang:
    name: Formatting - Clang
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check formatting
        uses: jidicula/clang-format-action@v4.16.0
        with:
          clang-format-version: '21'
          check-path: 'native/couchbase-lite-dart'

  analyze-dart:
    name: Analyze Dart code
    runs-on: blacksmith-4vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        dart: [stable, beta]
    continue-on-error: ${{ matrix.dart != 'stable' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.flutter-channel }}
          cache: true

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env[format('dart-version-{0}', matrix.dart)] }}

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Setup cbd
        run: melos activate:cbd

      - name: Bootstrap repository
        env:
          PREFETCHED_PACKAGES_PASSWORD:
            ${{ secrets.PREFETCHED_PACKAGES_PASSWORD }}
        shell: bash
        run: ./tools/dev-tools.sh bootstrap

      - name: Analyze Dart code
        run: melos analyze

  test-dart-unit:
    name: Dart unit tests
    strategy:
      fail-fast: false
      matrix:
        package: [cbl, cbl_sentry, cbl_generator]
        dart: [stable, beta]
        embedder: [standalone]
        os: [Ubuntu]
    env:
      EMBEDDER: ${{ matrix.embedder }}
      TARGET_OS: ${{ matrix.os }}
      TEST_PACKAGE: ${{ matrix.package }}
    continue-on-error: ${{ matrix.dart != 'stable' }}
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.flutter-channel }}
          cache: true

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env[format('dart-version-{0}', matrix.dart)] }}

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap repository
        env:
          PREFETCHED_PACKAGES_PASSWORD:
            ${{ secrets.PREFETCHED_PACKAGES_PASSWORD }}
        shell: bash
        run: ./tools/dev-tools.sh bootstrap

      - name: Setup cbd
        run: melos activate:cbd

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Build native libraries
        shell: bash
        run: ./tools/ci-steps.sh buildNativeLibraries

      - name: Run build_runner
        if: ${{ matrix.package == 'cbl_generator' }}
        run: ./tools/ci-steps.sh checkBuildRunnerOutput

      - name: Run tests
        run: ./tools/ci-steps.sh runUnitTests

      - name: Upload coverage data
        if: ${{ matrix.dart == 'stable' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          ./tools/ci-steps.sh uploadCoverageData "unit.${{ matrix.package }}"

  test-e2e:
    name: E2E tests
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        embedder: [standalone, flutter]
        os:
          - iOS
          - macOS
          - Android
          - Ubuntu
          - Windows
        exclude:
          - embedder: standalone
            os: iOS
          - embedder: standalone
            os: Android
          # TODO: Get iOS tests to launch again in CI
          - embedder: flutter
            os: iOS
    # Flutter + Ubuntu is flaky, likely because of a bug in CBL C, so we allow it to fail for now.
    continue-on-error:
      ${{ matrix.embedder == 'flutter' && matrix.os == 'Ubuntu' }}
    runs-on: >-
      ${{ fromJSON('{
        "iOS":"macos-14",
        "macOS":"macos-15",
        "Android":"blacksmith-4vcpu-ubuntu-2204",
        "Ubuntu":"blacksmith-4vcpu-ubuntu-2204",
        "Windows":"windows-2025"
      }')[matrix.os] }}
    env:
      EMBEDDER: ${{ matrix.embedder }}
      TARGET_OS: ${{ matrix.os }}
      TEST_PACKAGE: >-
        ${{ fromJSON('{
          "standalone":"cbl_e2e_tests_standalone_dart",
          "flutter":"cbl_e2e_tests_flutter"
        }')[matrix.embedder] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Select Java 17
        if: ${{ matrix.os == 'Android' }}
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Cache Android NDK and CMake
        if: ${{ matrix.os == 'Android' }}
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/28.0.13004108
            /usr/local/lib/android/sdk/ndk/28.2.13676358
            /usr/local/lib/android/sdk/cmake/3.18.1
            /usr/local/lib/android/sdk/platforms/android-33
            /usr/local/lib/android/sdk/platforms/android-36
          key: android-ndk-28.0.13004108-28.2.13676358-cmake-3.18.1-platforms-33-36

      - name: Install Android Native Toolchain
        if: ${{ matrix.os == 'Android' }}
        run: ./native/tools/android-sdk.sh installNativeToolchain

      - name: Install Android App Build Dependencies
        if: ${{ matrix.os == 'Android' }}
        run: ./native/tools/android-sdk.sh installAppBuildDeps

      - name: Setup Gradle
        if: ${{ matrix.os == 'Android' }}
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache apt packages
        if: matrix.os == 'Ubuntu' && matrix.embedder == 'flutter'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-flutter-linux-desktop-${{ runner.os }}

      - name: Install Flutter Linux Desktop dependencies
        if: matrix.os == 'Ubuntu' && matrix.embedder == 'flutter'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.flutter-channel }}
          cache: true

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        if: matrix.embedder == 'standalone'
        with:
          sdk: ${{ env.dart-version-stable }}

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap repository
        env:
          PREFETCHED_PACKAGES_PASSWORD:
            ${{ secrets.PREFETCHED_PACKAGES_PASSWORD }}
        shell: bash
        run: ./tools/dev-tools.sh bootstrap

      - name: Setup cbd
        run: melos activate:cbd

      - name: Build native libraries
        shell: bash
        run: ./tools/ci-steps.sh buildNativeLibraries

      - name: Start Couchbase services
        id: start_couchbase_services
        shell: bash
        run: ./tools/ci-steps.sh startCouchbaseServices

      - name: Debug macOS runner with tmate
        id: debug_tmate
        if: ${{ failure() && matrix.os == 'macOS' && steps.start_couchbase_services.outcome == 'failure' }}
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Publish tmate connection details
        if: ${{ matrix.os == 'macOS' && steps.start_couchbase_services.outcome == 'failure' && steps.debug_tmate.outcome == 'success' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          TMATE_SSH: ${{ steps.debug_tmate.outputs['tmate-ssh-command'] }}
          TMATE_WEB: ${{ steps.debug_tmate.outputs['tmate-web-url'] }}
        with:
          script: |
            const body = [
              'Temporary CI debug session is live.',
              '',
              `SSH: \`${process.env.TMATE_SSH}\``,
              `Web: ${process.env.TMATE_WEB}`,
              '',
              'This session is intentionally unrestricted for debugging. Cancel the job after debugging.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Keep macOS debug session alive
        if: ${{ matrix.os == 'macOS' && steps.start_couchbase_services.outcome == 'failure' && steps.debug_tmate.outcome == 'success' }}
        shell: bash
        run: sleep 1800

      - name: Cache Android emulator
        if: matrix.os == 'Android'
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/system-images/android-27
          key: android-system-image-27-x86_64-v2

      - name: Start virtual devices
        if: matrix.embedder == 'flutter'
        shell: bash
        run: ./tools/ci-steps.sh startVirtualDevices

      - name: Run tests
        uses: nick-fields/retry@v3
        with:
          shell: bash
          timeout_minutes: 20
          max_attempts: 3
          command: ./tools/ci-steps.sh runE2ETests

      - name: Collect test results
        if: failure()
        shell: bash
        run: ./tools/ci-steps.sh collectTestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.embedder }}
          path: test-results

      - name: Upload coverage data
        # Disabled until we figure out how to get coverage data from flutter tests
        if: ${{ matrix.embedder != 'flutter' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          ./tools/ci-steps.sh uploadCoverageData "e2e.cbl.${{ matrix.embedder }}.${{ matrix.os }}"

  test-e2e-cbl_flutter_prebuilt:
    # TODO: Re-enable after publishing new libcblitedart built against CBL 4.
    if: false
    name: cbl_flutter_prebuilt E2E tests
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        embedder: [flutter]
        os:
          - iOS
          - macOS
          - Android
          - Ubuntu
          - Windows
        exclude:
          # TODO: Get iOS tests to launch again in CI
          - embedder: flutter
            os: iOS
    runs-on: >-
      ${{ fromJSON('{
        "iOS":"macos-14",
        "macOS":"macos-15",
        "Android":"blacksmith-4vcpu-ubuntu-2204",
        "Ubuntu":"blacksmith-4vcpu-ubuntu-2204",
        "Windows":"windows-2025"
      }')[matrix.os] }}
    env:
      EMBEDDER: ${{ matrix.embedder }}
      TARGET_OS: ${{ matrix.os }}
      TEST_PACKAGE: cbl_flutter_prebuilt_e2e_tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - name: Select Java 17
        if: ${{ matrix.os == 'Android' }}
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Cache Android NDK
        if: ${{ matrix.os == 'Android' }}
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/28.2.13676358
            /usr/local/lib/android/sdk/platforms/android-33
            /usr/local/lib/android/sdk/platforms/android-36
          key: android-ndk-28.2.13676358-platforms-33-36

      - name: Install Android App Build Dependencies
        if: ${{ matrix.os == 'Android' }}
        run: ./native/tools/android-sdk.sh installAppBuildDeps

      - name: Setup Gradle
        if: ${{ matrix.os == 'Android' }}
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache apt packages
        if: matrix.os == 'Ubuntu'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-flutter-linux-desktop-${{ runner.os }}

      - name: Install Flutter Linux Desktop dependencies
        if: matrix.os == 'Ubuntu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.flutter-channel }}
          cache: true

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Setup cbd
        run: melos activate:cbd

      - name: Bootstrap repository
        env:
          PREFETCHED_PACKAGES_PASSWORD:
            ${{ secrets.PREFETCHED_PACKAGES_PASSWORD }}
        shell: bash
        run: ./tools/dev-tools.sh bootstrap

      - name: Cache Android emulator
        if: matrix.os == 'Android'
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/system-images/android-27
          key: android-system-image-27-x86_64-v2

      - name: Start virtual devices
        shell: bash
        run: ./tools/ci-steps.sh startVirtualDevices

      - name: Run tests
        uses: nick-fields/retry@v3
        with:
          shell: bash
          timeout_minutes: 20
          max_attempts: 3
          command: ./tools/ci-steps.sh runE2ETests

      - name: Collect test results
        if: failure()
        shell: bash
        run: ./tools/ci-steps.sh collectTestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cbl_flutter_prebuilt-${{ matrix.os }}
          path: test-results

      - name: Upload coverage data
        # Disabled until we figure out how to get coverage data from flutter tests
        if: ${{ false }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          ./tools/ci-steps.sh uploadCoverageData "e2e.prebuilt"

  test-cbl_dart:
    # TODO: Re-enable after publishing new libcblitedart built against CBL 4.
    if: false
    name: cbl_dart unit tests
    strategy:
      fail-fast: false
      matrix:
        package: [cbl_dart]
        dart: [stable]
        embedder: [standalone]
        os: [macOS, Ubuntu, Windows]
    env:
      EMBEDDER: ${{ matrix.embedder }}
      TARGET_OS: ${{ matrix.os }}
      TEST_PACKAGE: ${{ matrix.package }}
    continue-on-error: ${{ matrix.dart != 'stable' }}
    runs-on: >-
      ${{ fromJSON('{
        "macOS":"macos-15",
        "Ubuntu":"blacksmith-4vcpu-ubuntu-2204",
        "Windows":"windows-2025"
      }')[matrix.os] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.flutter-channel }}
          cache: true

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env[format('dart-version-{0}', matrix.dart)] }}

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap repository
        env:
          PREFETCHED_PACKAGES_PASSWORD:
            ${{ secrets.PREFETCHED_PACKAGES_PASSWORD }}
        shell: bash
        run: ./tools/dev-tools.sh bootstrap

      - name: Setup cbd
        run: melos activate:cbd

      - name: Run tests
        shell: bash
        run: ./tools/ci-steps.sh runUnitTests

      - name: Upload coverage data
        if: ${{ matrix.dart == 'stable' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          ./tools/ci-steps.sh uploadCoverageData "unit.${{ matrix.package }}"

  build-libcblitedart-release:
    name: build libcblitedart release
    strategy:
      fail-fast: false
      matrix:
        os:
          - iOS
          - macOS
          - Android
          - Ubuntu
          - Windows
    runs-on: >-
      ${{ fromJSON('{
        "iOS":"macos-14",
        "macOS":"macos-14",
        "Android":"blacksmith-4vcpu-ubuntu-2204",
        "Ubuntu":"blacksmith-4vcpu-ubuntu-2204",
        "Windows":"windows-2025"
      }')[matrix.os] }}

    steps:
      - uses: actions/checkout@v4

      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - name: Get CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Setup CBL Dart dev tools
        run: melos run activate:cbd

      - name: Cache Android NDK and CMake
        if: ${{ matrix.os == 'Android' }}
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/28.0.13004108
            /usr/local/lib/android/sdk/cmake/3.18.1
          key: android-ndk-28.0.13004108-cmake-3.18.1

      - name: Install Android Native Toolchain
        if: ${{ matrix.os == 'Android' }}
        run: ./native/tools/android-sdk.sh installNativeToolchain

      - name: Build release
        shell: bash
        run: |
          TARGET=""

          case ${{ matrix.os }} in
            iOS)
              TARGET="ios"
              ;;
            macOS)
              TARGET="macos"
              ;;
            Android)
              TARGET="android"
              ;;
            Ubuntu)
              TARGET="linux-x86_64"
              ;;
            Windows)
              TARGET="windows-x86_64"
              ;;
          esac

          ./native/couchbase-lite-dart/tools/build_release.sh 0.0.0 $TARGET
