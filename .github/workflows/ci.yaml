name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
  pull_request:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  flutter-channel: stable

jobs:
  formatting-dart:
    if: github.event_name != 'pull_request'
    name: Formatting - Dart
    timeout-minutes: 10
    runs-on: runs-on=${{ github.run_id }}/runner=ubuntu22-2cpu
    steps:
      - uses: runs-on/action@v2
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: ${{ env.flutter-channel }}
          cache: true
          pub-cache-hash-pattern: pubspec.lock

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Install daco
        run: dart pub global activate daco

      - name: Get dependencies
        run: dart pub get

      - name: Check formatting
        run: melos formatting:check

      - name: Print diff
        if: failure()
        run: git diff

  formatting-clang:
    if: github.event_name != 'pull_request'
    name: Formatting - Clang
    timeout-minutes: 10
    runs-on: runs-on=${{ github.run_id }}/runner=ubuntu22-2cpu
    steps:
      - uses: runs-on/action@v2
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check formatting
        uses: jidicula/clang-format-action@v4.17.0
        with:
          clang-format-version: "21"
          check-path: "packages/cbl/native/couchbase-lite-dart"

  analyze-dart:
    if: github.event_name != 'pull_request'
    name: Analyze Dart code
    timeout-minutes: 10
    runs-on: runs-on=${{ github.run_id }}/runner=ubuntu22-2cpu
    steps:
      - uses: runs-on/action@v2
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: ${{ env.flutter-channel }}
          cache: true
          pub-cache-hash-pattern: pubspec.lock

      - name: Setup Melos
        run: dart pub global activate melos

      - name: Bootstrap repository
        shell: bash
        run: melos bootstrap

      - name: Analyze Dart code
        run: melos analyze

  publish-dry-run:
    if: github.event_name != 'pull_request'
    name: Publish dry run
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [cbl, cbl_sentry, cbl_generator]
    runs-on: runs-on=${{ github.run_id }}/runner=ubuntu22-2cpu
    steps:
      - uses: runs-on/action@v2
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: ${{ env.flutter-channel }}
          cache: true
          pub-cache-hash-pattern: pubspec.lock

      - name: Get dependencies
        run: dart pub get

      - name: Bootstrap repository
        run: dart run melos bootstrap

      - name: Publish dry run
        working-directory: packages/${{ matrix.package }}
        run: dart pub publish --dry-run

  test-dart-unit:
    if: github.event_name != 'pull_request'
    name: Dart unit tests
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: [cbl, cbl_sentry, cbl_generator]
        embedder: [standalone]
        os: [Ubuntu]
        include:
          - package: cbl
            embedder: standalone
            os: macOS
          - package: cbl
            embedder: standalone
            os: Windows
    env:
      EMBEDDER: ${{ matrix.embedder }}
      TARGET_OS: ${{ matrix.os }}
      TEST_PACKAGE: ${{ matrix.package }}
    runs-on: >-
      ${{ fromJSON(format('{{
        "Ubuntu":"runs-on={0}/runner=ubuntu22-2cpu",
        "macOS":"macos-15",
        "Windows":"windows-2025"
      }}', github.run_id))[matrix.os] }}
    steps:
      - uses: runs-on/action@v2
        if: runner.os == 'Linux'
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux cross-compilation toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup Java
        if: runner.os == 'Linux' && matrix.package == 'cbl'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: runner.os == 'Linux' && matrix.package == 'cbl'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: runner.os == 'Linux' && matrix.package == 'cbl'
        run: ./tools/android-sdk.sh installNativeToolchain

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: ${{ env.flutter-channel }}
          cache: true
          pub-cache-hash-pattern: pubspec.lock

      - name: Get dependencies
        run: dart pub get

      - name: Bootstrap repository
        shell: bash
        run: dart run melos bootstrap

      - name: Run build_runner
        if: ${{ matrix.package == 'cbl_generator' }}
        shell: bash
        run: ./tools/ci-steps.sh checkBuildRunnerOutput

      - name: Run tests
        shell: bash
        run: ./tools/ci-steps.sh runUnitTests

      - name: Upload coverage data
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          ./tools/ci-steps.sh uploadCoverageData "unit.${{ matrix.package }}"

  test-e2e:
    name: E2E tests
    timeout-minutes: 25
    strategy:
      fail-fast: false
      # PRs are temporarily narrowed to the Android Flutter leg while
      # validating the RunsOn migration.
      matrix: >-
        ${{
          fromJSON(
            github.event_name == 'pull_request'
            && '{"embedder":["flutter"],"os":["Android"],"test_platform":[""]}'
            || '{
              "embedder":["standalone","flutter"],
              "os":["iOS","macOS","Android","Ubuntu","Windows"],
              "test_platform":[""],
              "include":[
                {"embedder":"standalone","os":"Ubuntu","test_platform":"vm-asan"}
              ],
              "exclude":[
                {"embedder":"standalone","os":"iOS"},
                {"embedder":"standalone","os":"Android"},
                {"embedder":"flutter","os":"iOS"}
              ]
            }'
          )
        }}
    runs-on: >-
      ${{ matrix.os == 'macOS' && matrix.embedder == 'standalone' && 'macos-15'
       || fromJSON(format('{{
        "iOS":"warp-macos-15-arm64-6x",
        "macOS":"macos-15",
        "Android":"runs-on={0}/family=m7+c7+m8+c8/cpu=4/image=ubuntu22-full-x64/extras=s3-cache/nested-virt",
        "Ubuntu":"runs-on={0}/runner=ubuntu22-4cpu",
        "Windows":"windows-2025"
      }}', github.run_id))[matrix.os] }}
    env:
      EMBEDDER: ${{ matrix.embedder }}
      TARGET_OS: ${{ matrix.os }}
      DART_TEST_PLATFORM: ${{ matrix.test_platform }}
      TEST_PACKAGE: >-
        ${{ fromJSON('{
          "standalone":"cbl_e2e_tests_standalone_dart",
          "flutter":"cbl_e2e_tests_flutter"
        }')[matrix.embedder] }}
    steps:
      - uses: runs-on/action@v2
        if: runner.os == 'Linux'
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        if: ${{ matrix.os == 'Android' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: ${{ matrix.os == 'Android' }}
        uses: android-actions/setup-android@v3

      - name: Install Android Native Toolchain
        if: ${{ matrix.os == 'Android' }}
        run: ./tools/android-sdk.sh installNativeToolchain

      - name: Install Android App Build Dependencies
        if: ${{ matrix.os == 'Android' }}
        run: ./tools/android-sdk.sh installAppBuildDeps

      - name: Setup Gradle
        if: ${{ matrix.os == 'Android' }}
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Cache apt packages
        if: matrix.os == 'Ubuntu' && matrix.embedder == 'flutter'
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-flutter-linux-desktop-${{ runner.os }}

      - name: Install Flutter Linux Desktop dependencies
        if: matrix.os == 'Ubuntu' && matrix.embedder == 'flutter'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev lld llvm

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: ${{ env.flutter-channel }}
          cache: true
          pub-cache-hash-pattern: pubspec.lock
          cache-provider: ${{ (matrix.os == 'iOS' && matrix.embedder == 'flutter') && 'warp' || 'github' }}

      - name: Setup Dart SDK
        if: matrix.test_platform == 'vm-asan'
        uses: dart-lang/setup-dart@v1
        with:
          sdk: main
          flavor: raw

      - name: Enable Flutter native assets
        if: matrix.embedder == 'flutter'
        run: flutter config --enable-native-assets

      - name: Get dependencies
        run: dart pub get

      - name: Bootstrap repository
        shell: bash
        run: dart run melos bootstrap

      - name: Cache Android emulator
        if: matrix.os == 'Android'
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/android/sdk/system-images/android-27
          key: android-system-image-27-x86_64-v2

      - name: Start Couchbase services
        shell: bash
        run: ./tools/ci-steps.sh startCouchbaseServices

      - name: Start virtual devices
        if: matrix.embedder == 'flutter'
        shell: bash
        run: ./tools/ci-steps.sh startVirtualDevices

      - name: Run tests
        timeout-minutes: 20
        shell: bash
        run: ./tools/ci-steps.sh runE2ETests

      - name: Collect test results
        if: failure()
        shell: bash
        run: ./tools/ci-steps.sh collectTestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.embedder }}${{ matrix.test_platform && format('-{0}', matrix.test_platform) || '' }}
          path: test-results

      - name: Upload coverage data
        # Disabled until we figure out how to get coverage data from flutter tests
        if: ${{ matrix.embedder != 'flutter' && matrix.test_platform == '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          ./tools/ci-steps.sh uploadCoverageData "e2e.cbl.${{ matrix.embedder }}.${{ matrix.os }}"
