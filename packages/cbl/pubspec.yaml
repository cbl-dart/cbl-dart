name: 'cbl'
version: 4.0.0-dev.0
description: >-
  An offline-first NoSQL document database with SQL++ queries, vector search,
  full-text search, live queries, encryption, bi-directional and peer-to-peer
  data sync.
homepage: https://github.com/cbl-dart/cbl-dart/tree/main/packages/cbl
repository: https://github.com/cbl-dart/cbl-dart
issue_tracker: https://github.com/cbl-dart/cbl-dart/issues
documentation: https://cbl-dart.dev

topics:
  - database
  - sql
  - sync
  - vector-search
  - full-text-search

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  archive: ^4.0.9
  characters: ^1.1.0
  code_assets: ^1.0.0
  collection: ^1.15.0
  ffi: ^2.2.0
  hooks: ^1.0.0
  http: ^1.2.2
  meta: ^1.3.0
  native_toolchain_c: ^0.17.4
  path: ^1.8.0
  stream_channel: ^2.1.0
  synchronized: ^3.0.0

dev_dependencies:
  ffigen: ^20.1.1
  test: ^1.21.1
