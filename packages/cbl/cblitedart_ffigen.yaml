name: cblitedart
description: Bindings for Couchbase Lite Dart Support API
output:
  bindings: lib/src/bindings/cblitedart.dart
  symbol-file:
    output: package:cbl/src/bindings/cblitedart_symbols.yaml
    import-path: package:cbl/src/bindings/cblitedart.dart
import:
  symbol-files:
    - package:cbl/src/bindings/cblite_symbols.yaml
ffi-native:
  asset-id: 'package:cbl/src/bindings/cblitedart.dart'
comments: false
headers:
  entry-points:
    - native/couchbase-lite-dart/include/CBL+Dart.h
    - native/couchbase-lite-dart/include/Fleece+Dart.h
  include-directives:
    - 'native/couchbase-lite-dart/include/*'
functions:
  expose-typedefs:
    include:
      - '.*'
  symbol-address:
    include:
      - CBLDart_AsyncCallback_Delete
      - CBLDart_CBLDatabase_Release
      - CBLDart_CBLReplicator_Release
      - CBLDart_FLArrayIterator_Delete
      - CBLDart_FLDictIterator_Delete
      - CBLDart_FLSliceResult_ReleaseByBuf
      - CBLDart_KnownSharedKeys_Delete
      - CBLDart_ListenerCertAuthCallbackTrampoline
      - CBLDart_ListenerPasswordAuthCallbackTrampoline
      - CBLDart_PredictiveModel_Delete
  # Leaf functions bypass some of the Dart-to-native calling overhead, but have
  # constraints:
  #
  # Hard: Must not call back into Dart or use any Dart VM APIs.
  # Soft: Should be short-running and non-blocking. A blocking leaf call delays
  #       GC and isolate group synchronization until it returns.
  #
  # Functions that only *store* AsyncCallbacks/Dart ports for later use are safe
  # to mark as leaf. Functions that call Dart_* APIs or synchronously invoke
  # Dart callbacks are not.
  leaf:
    include:
      - '.*'
    exclude:
      # Functions that call Dart VM APIs (Dart_InitializeApiDL,
      # Dart_NewPersistentHandle_DL, etc.).
      - CBLDart_Initialize
      - CBLDartKeyPair_CreateWithExternalKey
      # Functions that interact with Dart ports (create/close ports, post
      # messages, or invoke Dart callbacks synchronously).
      - CBLDart_AsyncCallback_New
      - CBLDart_AsyncCallback_Delete
      - CBLDart_AsyncCallback_Close
      - CBLDart_AsyncCallback_CallForTest
      - CBLDart_PredictiveModel_Delete
      - CBLDart_ListenerPasswordAuthCallbackTrampoline
      - CBLDart_ListenerCertAuthCallbackTrampoline
enums:
  as-int:
    include:
      - '.*'
compiler-opts:
  - '-Inative/couchbase-lite-dart/include'
  - '-Inative/vendor/cblite/include'
  - '-Inative/vendor/dart/include'
  # CBL uses a macro to define enums which is called CBL_ENUM.
  # On Apple systems the CBL aliases CF_ENUM to CBL_ENUM which seems to be a
  # problem for ffigen.
  # As a workaround we define __APPLE__ to 0 to avoid the aliasing.
  - '-D__APPLE__=0'
ignore-source-errors: true
