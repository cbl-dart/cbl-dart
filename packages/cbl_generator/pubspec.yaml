name: cbl_generator
version: 0.4.0-dev.5
description: >-
  Code generator for Couchbase Lite — generates typed document model classes
  for the embedded, offline-first, NoSQL JSON document database.
homepage: https://github.com/cbl-dart/cbl-dart/tree/main/packages/cbl_generator
repository: https://github.com/cbl-dart/cbl-dart
issue_tracker: https://github.com/cbl-dart/cbl-dart/issues
documentation: https://cbl-dart.dev

topics:
  - serialization
  - database
  - code-generation
  - nosql
  - build-runner

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  analyzer: ^10.0.0
  build: ^4.0.4
  cbl: ^4.0.0-dev.5
  collection: ^1.15.0
  meta: ^1.7.0
  source_gen: ^4.2.0
  source_helper: ^1.3.10

dev_dependencies:
  build_runner: ^2.11.1
  build_test: ^3.5.7
  logging: ^1.3.0
  path: ^1.8.1
  test: ^1.21.1
