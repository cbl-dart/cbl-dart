name: cbl_flutter_local
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.9.0
  flutter: '>=3.32.0'

resolution: workspace

dependencies:
  cbl_flutter_platform_interface: ^3.1.6
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        dartPluginClass: CblFlutterLocal
        package: com.terwesten.gabriel.cbl_flutter_local
        pluginClass: CblFlutterLocalPlugin
      ios:
        dartPluginClass: CblFlutterLocal
        pluginClass: CblFlutterLocalPlugin
      macos:
        dartPluginClass: CblFlutterLocal
        pluginClass: CblFlutterLocalPlugin
      linux:
        dartPluginClass: CblFlutterLocal
        pluginClass: CblFlutterLocalPlugin
      windows:
        dartPluginClass: CblFlutterLocal
        pluginClass: CblFlutterLocalPlugin
